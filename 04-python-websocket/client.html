<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Live Telemetry</title>
  <style>
    body { font-family: monospace; padding: 1rem; background: #111; color: #eee; }
    h2   { color: #7cf; }
    #log { border: 1px solid #444; padding: .5rem; height: 400px; overflow-y: auto; }
    .entry { padding: 2px 0; border-bottom: 1px solid #222; }
    .ts    { color: #888; }
    .vid   { color: #7cf; font-weight: bold; }
    .val   { color: #7f7; }
    #status { margin-bottom: .5rem; }
    .connected    { color: #7f7; }
    .disconnected { color: #f77; }
  </style>
</head>
<body>
  <h2>Live Telemetry &mdash; WebSocket Demo</h2>
  <div id="status" class="disconnected">Nicht verbunden</div>
  <button id="btn">Verbinden</button>
  <hr>
  <div id="log"></div>

  <script>
    const log    = document.getElementById("log");
    const status = document.getElementById("status");
    const btn    = document.getElementById("btn");
    let ws = null;

    function append(data) {
      const div = document.createElement("div");
      div.className = "entry";
      div.innerHTML =
        `<span class="ts">${data.timestamp}</span>  ` +
        `<span class="vid">${data.vehicle_id}</span>  ` +
        `${data.sensor}: <span class="val">${data.value} ${data.unit}</span>`;
      log.prepend(div);
      if (log.children.length > 200) log.lastChild.remove();
    }

    btn.addEventListener("click", () => {
      if (ws) { ws.close(); return; }

      ws = new WebSocket("ws://localhost:8765");

      ws.onopen = () => {
        status.textContent = "Verbunden mit ws://localhost:8765";
        status.className = "connected";
        btn.textContent = "Trennen";
      };

      ws.onmessage = (e) => append(JSON.parse(e.data));

      ws.onclose = () => {
        status.textContent = "Nicht verbunden";
        status.className = "disconnected";
        btn.textContent = "Verbinden";
        ws = null;
      };
    });
  </script>
</body>
</html>
